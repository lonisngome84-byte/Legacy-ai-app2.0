<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Legacy AI - Subscription Manager</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            padding-bottom: 40px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .card h2 {
            font-size: 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-group {
            margin-bottom: 12px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            color: #333;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            background: white;
        }
        
        button {
            background: #6200ee;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        
        button.secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .subscription-item {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .subscription-name {
            font-weight: 600;
        }
        
        .subscription-cost {
            color: #6200ee;
            font-weight: 600;
        }
        
        .wisdom-score {
            font-size: 12px;
            color: #666;
        }
        
        .analysis-result {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 12px;
            margin-top: 12px;
            font-size: 14px;
            line-height: 1.4;
        }
        
        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .api-key-warning {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 12px;
            margin-bottom: 16px;
            border-radius: 8px;
            font-size: 13px;
        }
        
        @media (max-width: 480px) {
            body { padding: 12px; }
            .card { padding: 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        <span>📊</span> Legacy AI
    </h1>
    <div class="subtitle">Your Digital Estate Manager • Subscription IQ</div>
    
    <!-- API Key Section -->
    <div class="card" id="apiCard">
        <h2>🔑 Step 1: Add Your Mistral API Key</h2>
        <div class="form-group">
            <label>Mistral API Key</label>
            <input type="password" id="apiKeyInput" placeholder="Enter your API key from console.mistral.ai">
        </div>
        <button onclick="saveApiKey()">Save API Key</button>
        <div class="api-key-warning" style="margin-top: 12px;">
            💡 Your key stays in your browser. Never shared with any server.
        </div>
    </div>
    
    <!-- Add Subscription Section -->
    <div class="card" id="addCard" style="display: none;">
        <h2>➕ Add Subscription</h2>
        <div class="form-group">
            <label>Service Name</label>
            <input type="text" id="serviceName" placeholder="e.g., Netflix, Spotify">
        </div>
        <div class="form-group">
            <label>Monthly Price ($)</label>
            <input type="number" id="monthlyPrice" placeholder="12.99" step="0.01">
        </div>
        <div class="form-group">
            <label>Last Used Date</label>
            <input type="date" id="lastUsed">
        </div>
        <button onclick="addSubscription()">Add Subscription</button>
    </div>
    
    <!-- Subscriptions List -->
    <div class="card" id="listCard" style="display: none;">
        <h2>📋 Your Subscriptions</h2>
        <div id="subscriptionsList">No subscriptions yet. Add one above.</div>
    </div>
    
    <!-- AI Analysis Section -->
    <div class="card" id="analysisCard" style="display: none;">
        <h2>🤖 Subscription IQ Analysis</h2>
        <button class="secondary" onclick="runAIAnalysis()" id="analyzeBtn">Run AI Analysis</button>
        <div id="analysisResult"></div>
    </div>
</div>

<script>
    let subscriptions = [];
    let mistralApiKey = '';
    
    // Load saved data on page load
    window.onload = function() {
        const savedKey = localStorage.getItem('mistral_api_key');
        if (savedKey) {
            mistralApiKey = savedKey;
            document.getElementById('apiKeyInput').value = '••••••••';
            document.getElementById('apiCard').style.display = 'none';
            document.getElementById('addCard').style.display = 'block';
            document.getElementById('listCard').style.display = 'block';
            document.getElementById('analysisCard').style.display = 'block';
        }
        
        const savedSubs = localStorage.getItem('subscriptions');
        if (savedSubs) {
            subscriptions = JSON.parse(savedSubs);
            renderSubscriptions();
        }
    };
    
    function saveApiKey() {
        const key = document.getElementById('apiKeyInput').value.trim();
        if (key) {
            mistralApiKey = key;
            localStorage.setItem('mistral_api_key', key);
            document.getElementById('apiCard').style.display = 'none';
            document.getElementById('addCard').style.display = 'block';
            document.getElementById('listCard').style.display = 'block';
            document.getElementById('analysisCard').style.display = 'block';
        } else {
            alert('Please enter a valid API key');
        }
    }
    
    function addSubscription() {
        const name = document.getElementById('serviceName').value.trim();
        const price = parseFloat(document.getElementById('monthlyPrice').value);
        const lastUsed = document.getElementById('lastUsed').value;
        
        if (!name || isNaN(price) || !lastUsed) {
            alert('Please fill in all fields');
            return;
        }
        
        subscriptions.push({
            id: Date.now(),
            name: name,
            price: price,
            lastUsed: lastUsed,
            addedDate: new Date().toISOString()
        });
        
        localStorage.setItem('subscriptions', JSON.stringify(subscriptions));
        renderSubscriptions();
        
        // Clear form
        document.getElementById('serviceName').value = '';
        document.getElementById('monthlyPrice').value = '';
        document.getElementById('lastUsed').value = '';
    }
    
    function deleteSubscription(id) {
        subscriptions = subscriptions.filter(s => s.id !== id);
        localStorage.setItem('subscriptions', JSON.stringify(subscriptions));
        renderSubscriptions();
    }
    
    function renderSubscriptions() {
        const container = document.getElementById('subscriptionsList');
        if (subscriptions.length === 0) {
            container.innerHTML = 'No subscriptions yet. Add one above.';
            return;
        }
        
        let totalMonthly = 0;
        subscriptions.forEach(sub => { totalMonthly += sub.price; });
        
        let html = `<div style="margin-bottom: 12px; padding: 8px; background: #f0f0f0; border-radius: 8px;">
                        <strong>💰 Total Monthly: $${totalMonthly.toFixed(2)}</strong>
                        <span style="float: right;">📅 ${subscriptions.length} services</span>
                    </div>`;
        
        subscriptions.forEach(sub => {
            const daysSinceLastUsed = Math.floor((new Date() - new Date(sub.lastUsed)) / (1000 * 60 * 60 * 24));
            let warning = '';
            if (daysSinceLastUsed > 60) warning = '⚠️ Inactive for ' + daysSinceLastUsed + ' days';
            else if (daysSinceLastUsed > 30) warning = '📅 Used ' + daysSinceLastUsed + ' days ago';
            
            html += `
                <div class="subscription-item">
                    <div>
                        <div class="subscription-name">${escapeHtml(sub.name)}</div>
                        <div class="wisdom-score">${warning}</div>
                    </div>
                    <div>
                        <span class="subscription-cost">$${sub.price.toFixed(2)}/mo</span>
                        <button class="delete-btn" onclick="deleteSubscription(${sub.id})" style="margin-left: 12px;">✕</button>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }
    
    async function runAIAnalysis() {
        if (!mistralApiKey) {
            alert('Please add your Mistral API key first');
            return;
        }
        
        if (subscriptions.length === 0) {
            alert('Add some subscriptions first');
            return;
        }
        
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resultDiv = document.getElementById('analysisResult');
        
        analyzeBtn.disabled = true;
        analyzeBtn.textContent = 'Analyzing...';
        resultDiv.innerHTML = '<div class="loading">🤖 AI is analyzing your spending habits...</div>';
        
        // Prepare subscription data for AI
        const subscriptionData = subscriptions.map(sub => ({
            name: sub.name,
            price: sub.price,
            lastUsed: sub.lastUsed,
            daysSinceLastUsed: Math.floor((new Date() - new Date(sub.lastUsed)) / (1000 * 60 * 60 * 24))
        }));
        
        const prompt = `You are a financial advisor. Analyze these subscriptions and provide:
1. Identify any "zombie subscriptions" (unused for over 60 days)
2. Calculate total monthly and yearly spending
3. Suggest which ones to cancel first
4. Provide one money-saving tip

Subscriptions: ${JSON.stringify(subscriptionData, null, 2)}

Respond in a friendly, helpful tone. Keep it under 200 words.`;
        
        try {
            const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${mistralApiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'mistral-small-latest',
                    messages: [
                        {
                            role: 'system',
                            content: 'You are a helpful financial advisor focused on saving users money.'
                        },
                        {
                            role: 'user',
                            content: prompt
                        }
                    ],
                    temperature: 0.7,
                    max_tokens: 500
                })
            });
            
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || `API Error: ${response.status}`);
            }
            
            const data = await response.json();
            const analysis = data.choices[0].message.content;
            
            resultDiv.innerHTML = `<div class="analysis-result">🤖 <strong>AI Analysis:</strong><br><br>${analysis.replace(/\n/g, '<br>')}</div>`;
        } catch (error) {
            console.error('API Error:', error);
            resultDiv.innerHTML = `<div class="analysis-result" style="background:#ffebee;">❌ Error: ${error.message}<br><br>Make sure your API key is valid and you have credits.</div>`;
        } finally {
            analyzeBtn.disabled = false;
            analyzeBtn.textContent = 'Run AI Analysis';
        }
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
</body>
  </html>
